<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">GEO Prompt Audit Dashboard Mockup</title>
  <desc id="desc">A simple dashboard mockup showing AI visibility scores by engine, trend line and low-performing prompts.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <rect width="1200" height="82" fill="#172332"/>
