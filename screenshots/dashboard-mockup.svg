  <rect x="800" y="285" width="350" height="355" rx="8" fill="#ffffff" stroke="#d2dae4"/>
  <text x="830" y="325" font-family="Arial, sans-serif" font-size="22" fill="#172332" font-weight="700">Low prompts</text>
  <g font-family="Arial, sans-serif" font-size="18" fill="#445060">
    <text x="835" y="390">GEO consultant</text>
    <text x="835" y="452">Local AI SMB</text>
    <text x="835" y="514">Comparison</text>
  </g>
  <g fill="#d65c5c">
    <rect x="1050" y="374" width="58" height="22" rx="11"/>
    <rect x="1050" y="436" width="58" height="22" rx="11"/>
