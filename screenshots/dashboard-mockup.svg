    <text x="915" y="198" font-size="34" font-weight="700">45</text>
    <rect x="990" y="181" width="57" height="16" rx="8" fill="#d65c5c"/>
  </g>
  <rect x="55" y="285" width="700" height="355" rx="8" fill="#ffffff" stroke="#d2dae4"/>
  <text x="85" y="325" font-family="Arial, sans-serif" font-size="22" fill="#172332" font-weight="700">Score over time</text>
  <polyline points="130,555 250,505 370,520 490,450 610,420" fill="none" stroke="#2c78be" stroke-width="6"/>
  <g fill="#2c78be">
    <circle cx="130" cy="555" r="13"/>
    <circle cx="250" cy="505" r="13"/>
    <circle cx="370" cy="520" r="13"/>
    <circle cx="490" cy="450" r="13"/>
    <circle cx="610" cy="420" r="13"/>
