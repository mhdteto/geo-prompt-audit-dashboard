    <text x="635" y="152" font-weight="700">Gemini</text>
    <text x="635" y="198" font-size="34" font-weight="700">87</text>
    <rect x="710" y="181" width="111" height="16" rx="8" fill="#2ca070"/>
    <rect x="890" y="115" width="240" height="120" rx="8" fill="#ffffff" stroke="#d2dae4"/>
